<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Lab — My Vocabulary Collection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1a1a2e;
    --paper:     #f7f4ef;
    --cream:     #ede9e0;
    --accent:    #c0392b;
    --accent2:   #1a73e8;
    --gold:      #e0a03b;
    --muted:     #8a8478;
    --card-bg:   #ffffff;
    --border:    #ddd8ce;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--cream) 39px, var(--cream) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--cream) 39px, var(--cream) 40px);
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 1;
    padding: 48px 40px 36px;
    border-bottom: 2px solid var(--border);
    background: var(--paper);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }

  .logo-block h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: var(--ink);
  }

  .logo-block h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .logo-block p {
    font-size: 0.88rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .header-meta {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .header-meta .count-big {
    font-size: 2rem;
    font-family: 'DM Serif Display', serif;
    color: var(--ink);
    display: block;
    line-height: 1;
  }

  /* ── Toolbar ── */
  .toolbar {
    position: relative;
    z-index: 1;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent2);
  }

  .filter-btn {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .sort-select {
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    outline: none;
    margin-left: auto;
  }

  /* ── Main grid ── */
  main {
    position: relative;
    z-index: 1;
    padding: 36px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* ── Word Card ── */
  .word-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 24px 22px 20px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }

  .word-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    border-color: transparent;
  }

  .word-card:hover::before {
    transform: scaleX(1);
  }

  .card-word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .card-pos {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .card-preview {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--cream);
  }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .card-level {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .level-new    { background: #e8f5e9; color: #2e7d32; }
  .level-learn  { background: #fff8e1; color: #f57f17; }
  .level-master { background: #e3f2fd; color: #1565c0; }

  /* ── Empty State ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 0.88rem;
    line-height: 1.7;
  }

  /* ── Error/Loading banner ── */
  #status-banner {
    display: none;
    position: relative;
    z-index: 1;
    margin: 0 40px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
  }

  #status-banner.info  { background: #e8f0fe; color: #1a73e8; border: 1px solid #c5d8fb; }
  #status-banner.warn  { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
  #status-banner.error { background: #fce8e6; color: #c0392b; border: 1px solid #f5c6c2; }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  footer a { color: var(--accent2); text-decoration: none; }

  /* ── How-to panel ── */
  .howto {
    position: relative;
    z-index: 1;
    margin: 0 40px 0;
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 22px 28px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
  }

  .howto h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    margin-bottom: 10px;
    color: var(--gold);
  }

  .howto ol {
    font-size: 0.82rem;
    line-height: 2;
    padding-left: 18px;
    color: #c8c4b8;
  }

  .howto code {
    font-family: 'DM Mono', monospace;
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.78rem;
    color: #f0c060;
  }

  .howto-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-card:nth-child(1)  { animation-delay: 0.05s; }
  .word-card:nth-child(2)  { animation-delay: 0.10s; }
  .word-card:nth-child(3)  { animation-delay: 0.15s; }
  .word-card:nth-child(4)  { animation-delay: 0.20s; }
  .word-card:nth-child(5)  { animation-delay: 0.25s; }
  .word-card:nth-child(6)  { animation-delay: 0.30s; }
  .word-card:nth-child(7)  { animation-delay: 0.35s; }
  .word-card:nth-child(8)  { animation-delay: 0.40s; }

  @media (max-width: 600px) {
    header, .toolbar, main { padding-left: 20px; padding-right: 20px; }
    #status-banner, .howto { margin-left: 20px; margin-right: 20px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-block">
    <h1>Vocab <span>Lab</span></h1>
    <p>Personal English Vocabulary Collection · Bulunangko</p>
  </div>
  <div class="header-meta">
    <span class="count-big" id="total-count">—</span>
    total words
    <br>
    <span id="last-added">loading...</span>
  </div>
</header>


<!-- Status / error banner -->
<div id="status-banner"></div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Cari kata..." autocomplete="off">
  </div>
  <button class="filter-btn active" data-level="all">Semua</button>
  <button class="filter-btn" data-level="new">New</button>
  <button class="filter-btn" data-level="learning">Learning</button>
  <button class="filter-btn" data-level="mastered">Mastered</button>
  <select class="sort-select" id="sort-select">
    <option value="date-desc">Terbaru dulu</option>
    <option value="date-asc">Terlama dulu</option>
    <option value="alpha">A → Z</option>
  </select>
</div>

<!-- Main content -->
<main>
  <p class="section-label" id="section-label">Koleksi Kosakata</p>
  <div class="card-grid" id="card-grid">
    <!-- Cards injected by JS -->
  </div>
</main>

<footer>
  Vocab Lab · dibuat dengan ♥ untuk belajar Bahasa Inggris ·
  <a href="https://github.com" target="_blank">Format index.txt</a>
</footer>

<script>
  /* ──────────────────────────────────────────
     CONFIG
  ────────────────────────────────────────── */
  const MANIFEST_FILE = 'index.txt';

  // Fallback data jika index.txt tidak ditemukan (untuk demo/testing)
  const FALLBACK_ENTRIES = [
    {
      file: 'gravitate.html',
      word: 'gravitate',
      date: '2026-04-20',
      pos: 'verb',
      preview: 'Tertarik secara alami ke suatu arah, orang, atau hal — seperti ada magnet tak kasat mata.',
      level: 'new'
    }
  ];

  /* ──────────────────────────────────────────
     STATE
  ────────────────────────────────────────── */
  let allEntries = [];
  let activeLevel = 'all';
  let searchQuery = '';
  let sortMode = 'date-desc';

  /* ──────────────────────────────────────────
     PARSE index.txt
     Format per baris:
     filename.html | word | YYYY-MM-DD | pos | preview | level
  ────────────────────────────────────────── */
  function parseLine(line) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) return null;
    const parts = trimmed.split('|').map(s => s.trim());
    if (parts.length < 2) return null;
    return {
      file:    parts[0] || '',
      word:    parts[1] || parts[0].replace('.html',''),
      date:    parts[2] || '',
      pos:     parts[3] || 'word',
      preview: parts[4] || '',
      level:   (parts[5] || 'new').toLowerCase()
    };
  }

  /* ──────────────────────────────────────────
     FETCH MANIFEST
  ────────────────────────────────────────── */
  async function loadManifest() {
    showBanner('Memuat index.txt...', 'info');
    try {
      const resp = await fetch(MANIFEST_FILE + '?nocache=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      const lines = text.split('\n');
      allEntries = lines.map(parseLine).filter(Boolean);

      if (allEntries.length === 0) {
        showBanner('index.txt kosong. Menampilkan data contoh.', 'warn');
        allEntries = FALLBACK_ENTRIES;
      } else {
        hideBanner();
      }
    } catch (err) {
      // Kemungkinan besar file:// protocol atau index.txt belum ada
      showBanner(
        `⚠ Tidak bisa membaca index.txt (${err.message}). ` +
        `Pastikan kamu membuka via server lokal, bukan file://. Menampilkan data demo.`,
        'warn'
      );
      allEntries = FALLBACK_ENTRIES;
    }
    updateHeaderCount();
    renderCards();
  }

  /* ──────────────────────────────────────────
     RENDER
  ────────────────────────────────────────── */
  function getFiltered() {
    let entries = [...allEntries];

    // Filter level
    if (activeLevel !== 'all') {
      entries = entries.filter(e => e.level === activeLevel);
    }

    // Filter search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      entries = entries.filter(e =>
        e.word.toLowerCase().includes(q) ||
        e.preview.toLowerCase().includes(q)
      );
    }

    // Sort
    if (sortMode === 'alpha') {
      entries.sort((a, b) => a.word.localeCompare(b.word));
    } else if (sortMode === 'date-asc') {
      entries.sort((a, b) => (a.date > b.date ? 1 : -1));
    } else {
      entries.sort((a, b) => (a.date < b.date ? 1 : -1));
    }

    return entries;
  }

  function levelClass(level) {
    if (level === 'mastered') return 'level-master';
    if (level === 'learning') return 'level-learn';
    return 'level-new';
  }

  function levelLabel(level) {
    if (level === 'mastered') return 'Mastered';
    if (level === 'learning') return 'Learning';
    return 'New';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return dateStr; }
  }

  function renderCards() {
    const grid = document.getElementById('card-grid');
    const label = document.getElementById('section-label');
    const filtered = getFiltered();

    label.textContent = `${filtered.length} kata ditemukan`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <h3>Belum ada kata</h3>
          <p>Tambahkan entri ke <code>index.txt</code> atau coba ubah filter pencarian.</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map((e, i) => `
      <a class="word-card" href="${e.file}" style="animation-delay:${Math.min(i * 0.05, 0.4)}s">
        <div class="card-pos">${e.pos}</div>
        <div class="card-word">${e.word}</div>
        <div class="card-preview">${e.preview || 'Klik untuk membuka flashcard →'}</div>
        <div class="card-footer">
          <span class="card-date">${formatDate(e.date)}</span>
          <span class="card-level ${levelClass(e.level)}">${levelLabel(e.level)}</span>
        </div>
      </a>
    `).join('');
  }

  function updateHeaderCount() {
    document.getElementById('total-count').textContent = allEntries.length;
    const sorted = [...allEntries].sort((a,b) => a.date < b.date ? 1 : -1);
    const latest = sorted[0];
    if (latest) {
      document.getElementById('last-added').textContent =
        'Terakhir: ' + formatDate(latest.date);
    }
  }

  /* ──────────────────────────────────────────
     BANNER HELPERS
  ────────────────────────────────────────── */
  function showBanner(msg, type='info') {
    const b = document.getElementById('status-banner');
    b.textContent = msg;
    b.className = type;
    b.style.display = 'block';
  }

  function hideBanner() {
    const b = document.getElementById('status-banner');
    b.style.display = 'none';
  }

  /* ──────────────────────────────────────────
     EVENT LISTENERS
  ────────────────────────────────────────── */
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderCards();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeLevel = btn.dataset.level;
      renderCards();
    });
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    renderCards();
  });

  /* ──────────────────────────────────────────
     INIT
  ────────────────────────────────────────── */
  loadManifest();
</script>
</body>
</html>
